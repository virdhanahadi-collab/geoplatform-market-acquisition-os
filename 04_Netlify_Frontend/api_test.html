<!doctype html>
<html><head><meta charset="utf-8"><title>GeoPlatform API Test</title>
<style>body{font-family:Arial;margin:40px;background:#f6f9fc;color:#111928}.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:20px;margin:12px 0}button{background:#005B96;color:#fff;border:0;border-radius:8px;padding:10px 14px}pre{background:#111928;color:#eaf3ff;padding:16px;border-radius:8px;overflow:auto}</style></head>
<body><h1>GeoPlatform API Test</h1><p>Deploy ini di Netlify lalu klik tombol untuk mengecek koneksi Apps Script.</p>
<div class="card"><button onclick="test('health')">Test Health</button> <button onclick="test('getContacts')">Get Contacts</button> <button onclick="test('getDriveFiles')">Get Drive Files</button></div>
<pre id="out">Belum ada test.</pre>
<script src="js/google-api-client.js"></script>
<script>
async function test(action){
  const out=document.getElementById('out'); out.textContent='Loading...';
  try{ const data=await GeoAPI.get(action,{limit:5}); out.textContent=JSON.stringify(data,null,2); }
  catch(e){ out.textContent='ERROR: '+e.message; }
}
</script></body></html>
